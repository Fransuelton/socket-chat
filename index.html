<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Socket.IO chat</title>
    <style>
      body {
        margin: 0;
        padding-bottom: 3rem;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
      }

      #form {
        background: rgba(0, 0, 0, 0.15);
        padding: 0.25rem;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        display: flex;
        height: 3rem;
        box-sizing: border-box;
        backdrop-filter: blur(10px);
      }
      #input {
        border: none;
        padding: 0 1rem;
        flex-grow: 1;
        border-radius: 2rem;
        margin: 0.25rem;
      }
      #input:focus {
        outline: none;
      }
      #form > button {
        background: #333;
        border: none;
        padding: 0 1rem;
        margin: 0.25rem;
        border-radius: 3px;
        outline: none;
        color: #fff;
      }

      #messages {
        list-style-type: none;
        margin: 0;
        padding: 0;
      }
      #messages > li {
        padding: 0.5rem 1rem;
      }
      #messages > li:nth-child(odd) {
        background: #efefef;
      }
      .username {
        font-weight: bold;
        color: #2563eb;
        margin-right: 8px;
      }
    </style>
  </head>
  <body>
    <ul id="messages"></ul>
    <form id="form" action="">
      <input id="input" autocomplete="off" placeholder="Digite sua mensagem..." /><button>Enviar</button>
    </form>
  </body>
  <script src="/socket.io/socket.io.js"></script>
  <script>
    // 1. Verifica se o usuário está "logado"
    const username = localStorage.getItem('chat:username');
    if (!username) {
      window.location.href = '/login';
    }

    const socket = io();

    const form = document.getElementById("form");
    const input = document.getElementById("input");
    const messages = document.getElementById("messages");

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      if (input.value) {
        // 2. Envia um objeto com o usuário e o texto
        socket.emit("chat message", {
          user: username,
          text: input.value
        });
        input.value = "";
      }
    });

    // 3. Recebe e exibe a mensagem com o nome do usuário
    socket.on("chat message", (data) => {
      const item = document.createElement("li");
      
      const userSpan = document.createElement("span");
      userSpan.className = "username";
      userSpan.textContent = data.user + ":";
      
      const textSpan = document.createElement("span");
      textSpan.textContent = data.text;

      item.appendChild(userSpan);
      item.appendChild(textSpan);
      
      messages.appendChild(item);
      window.scrollTo(0, document.body.scrollHeight);
    });
  </script>
</html>
