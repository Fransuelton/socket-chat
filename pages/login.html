<!DOCTYPE html>
<html lang="pt-BR">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Login</title>
	<style>
		:root {
			color-scheme: light;
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
		}

		body {
			margin: 0;
			min-height: 100vh;
			display: grid;
			place-items: center;
			background: #f3f4f6;
		}

		.login-card {
			width: 100%;
			max-width: 360px;
			background: #ffffff;
			border-radius: 12px;
			padding: 24px;
			box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
			box-sizing: border-box;
		}

		h1 {
			margin: 0 0 18px;
			font-size: 1.4rem;
			text-align: center;
			color: #111827;
		}

		.field {
			display: flex;
			flex-direction: column;
			margin-bottom: 12px;
		}

		label {
			margin-bottom: 6px;
			color: #374151;
			font-size: 0.9rem;
		}

		input {
			border: 1px solid #d1d5db;
			border-radius: 8px;
			padding: 10px;
			font-size: 0.95rem;
			outline: none;
		}

		input:focus {
			border-color: #2563eb;
			box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2);
		}

		button {
			width: 100%;
			border: none;
			border-radius: 8px;
			padding: 11px;
			margin-top: 8px;
			background: #2563eb;
			color: white;
			font-weight: 600;
			cursor: pointer;
		}

		button:hover {
			background: #1d4ed8;
		}

		.hint {
			margin-top: 12px;
			text-align: center;
			color: #6b7280;
			font-size: 0.85rem;
		}
	</style>
</head>
<body>
	<main class="login-card">
		<h1>Entrar no chat</h1>
		<form id="loginForm">
			<div class="field">
				<label for="username">Usuário</label>
				<input id="username" name="username" type="text" required placeholder="Seu nome" />
			</div>

			<div class="field">
				<label for="password">Senha</label>
				<input id="password" name="password" type="password" required placeholder="••••••••" />
			</div>

			<button type="submit">Entrar</button>
		</form>
		<p class="hint">Página de login simples (MVP).</p>
	</main>

	<script>
		const form = document.getElementById('loginForm');

		form.addEventListener('submit', (event) => {
			event.preventDefault();
			const username = document.getElementById('username').value.trim();

			if (!username) {
				return;
			}

			localStorage.setItem('chat:username', username);
			window.location.href = '/';
		});
	</script>
</body>
</html>
